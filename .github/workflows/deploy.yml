name: Deploy to Firebase Hosting

# Auto-deploys winkingstar.com on every push to main, plus a manual
# "Run workflow" trigger so you can re-deploy without a code change.
#
# Why this exists: the local Firebase CLI hangs on this iCloud-synced
# filesystem, blocking `npm run deploy` from a Claude Code session.
# GitHub Actions runs in a clean Linux VM with no such issues.
#
# Why this checks out two repos: package.json depends on
#   "@weekly-superstar/shared": "file:../weekly-superstar-shared"
# so the sibling repo must be present and built before npm install
# can resolve the link.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - 'firebase.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: firebase-hosting-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout web app
        uses: actions/checkout@v4
        with:
          path: weekly-superstar-tracker

      - name: Checkout shared package (sibling)
        uses: actions/checkout@v4
        with:
          repository: shannonhecker/weekly-superstar-shared
          path: weekly-superstar-shared
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: weekly-superstar-tracker/package-lock.json

      - name: Build shared package
        working-directory: weekly-superstar-shared
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Install web app dependencies
        working-directory: weekly-superstar-tracker
        run: npm ci --legacy-peer-deps

      - name: Build web app
        working-directory: weekly-superstar-tracker
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@v14.10.1
        with:
          args: deploy --only hosting --project weekly-superstar-tracker
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_PATH: ./weekly-superstar-tracker
