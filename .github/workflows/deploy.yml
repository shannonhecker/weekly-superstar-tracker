name: Deploy to Firebase Hosting

on:
  push:
    branches: [main, claude/build-kids-tracker-60KYv]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyCF3_yUywAlGqboYzZEg7a51r1t6ajqPU4
          VITE_FIREBASE_AUTH_DOMAIN: weekly-superstar-tracker.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: weekly-superstar-tracker
          VITE_FIREBASE_STORAGE_BUCKET: weekly-superstar-tracker.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: 435999630313
          VITE_FIREBASE_APP_ID: "1:435999630313:web:a46a59fa3b91ee7c54e178"
      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/sa-key.json
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Deploy
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /home/runner/sa-key.json
        run: firebase deploy --only hosting,firestore:rules,storage --project weekly-superstar-tracker --non-interactive
